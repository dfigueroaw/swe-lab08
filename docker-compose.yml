services:
  transactions-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: transactions
      POSTGRES_PASSWORD: transactions
    ports:
      - "5432:5432"
    volumes:
      - ./ms-restaurant/database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  rewards-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rewards
      POSTGRES_USER: rewards
      POSTGRES_PASSWORD: rewards
    ports:
      - "5433:5432"
    volumes:
      - ./ms-rewards/database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards"]
      interval: 5s
      timeout: 3s
      retries: 10

  ms-restaurant:
    build: ./ms-restaurant
    environment:
      PORT: 3000
      DATABASE_URL: postgres://transactions:transactions@transactions-db:5432/transactions
      RABBITMQ_URL: ${RABBITMQ_URL:?Set RABBITMQ_URL in your shell or root .env file}
    ports:
      - "3000:3000"
    depends_on:
      transactions-db:
        condition: service_healthy

  ms-rewards:
    build: ./ms-rewards
    environment:
      PORT: 3001
      DATABASE_URL: postgres://rewards:rewards@rewards-db:5432/rewards
      RABBITMQ_URL: ${RABBITMQ_URL:?Set RABBITMQ_URL in your shell or root .env file}
    depends_on:
      rewards-db:
        condition: service_healthy
